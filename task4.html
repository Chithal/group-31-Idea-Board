<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Toolkit</title>
    <link rel="stylesheet" href="simple.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo-section">
                <img src="images.png" alt="UCSC Logo" class="ucsc-logo">
                <h1>Student Toolkit</h1>
            </div>
            <ul>
                <li><a href="#gpa-calculator">GPA Calculator</a></li>
                <li><a href="#study-timer">Study Timer</a></li>
            </ul>
            <div class="dark-mode-toggle">
                <input type="checkbox" id="dark-mode-switch" class="toggle-checkbox">
                <label for="dark-mode-switch" class="toggle-label"></label>
                <span class="toggle-text">Dark Mode</span>
            </div>
        </div>
    </nav>

    <aside class="sidebar">
        <h2>Upcoming Events</h2>
        <ul>
            <li class="event-item">
                <span class="event-title">Midterm Exam</span>
                <span class="event-date">March 15</span>
            </li>
            <li class="event-item">
                <span class="event-title">Project Deadline</span>
                <span class="event-date">March 20</span>
            </li>
            <li class="event-item">
                <span class="event-title">Spring Break</span>
                <span class="event-date">March 25-30</span>
            </li>
        </ul>
    </aside>

    <main>
        <section id="gpa-calculator">
            <h2>GPA Calculator</h2>
            <div class="input-group">
                <label for="course1-grade">Course 1 Grade (0-4):</label>
                <input type="number" id="course1-grade" min="0" max="4" step="0.1" required>
                <label for="course1-credits">Credits:</label>
                <input type="number" id="course1-credits" min="1" required>
            </div>
            <div class="input-group">
                <label for="course2-grade">Course 2 Grade (0-4):</label>
                <input type="number" id="course2-grade" min="0" max="4" step="0.1" required>
                <label for="course2-credits">Credits:</label>
                <input type="number" id="course2-credits" min="1" required>
            </div>
            <button id="calculate-gpa">Calculate</button>
            <div id="gpa-result"></div>
        </section>

        <section id="study-timer">
            <h2>Pomodoro Study Timer</h2>
            <div id="timer-display">25:00</div>
            <button id="start-timer">Start</button>
            <button id="reset-timer">Reset</button>
        </section>
    </main>

    <script src="simple.js"></script>
</body>
</html>
