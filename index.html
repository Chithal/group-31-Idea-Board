<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <header>
            <h1>Group Idea Board</h1>
            <button id="theme-toggle">Toggle Dark Mode</button>
        </header>
        <main>
            <div class="input-group">
                <input type="text" id="name-input" placeholder="Enter your name...">
                <input type="text" id="idea-input" placeholder="Enter your idea here...">
                <button id="add-idea-btn" disabled>Add Idea</button>
            </div>
            <div id="idea-counter">Total Ideas: 0</div>
            <ul id="idea-list">
                <!-- Ideas will be added here -->
            </ul>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
