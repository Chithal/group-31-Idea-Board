<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Group Idea Board</title>
  <style>
    /* define palette variables for easy tweaks */
    :root {
      --primary: #007bff;
      --primary-dark: #08356b;
      --background: #f4f6f8;
      --board-bg: #ffffff;
      --input-border: #ccd0d5;
      --idea-bg: #fdfdfd;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #3a5b87 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .board {
      background: var(--board-bg);
      width: 90%;
      max-width: 450px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .header {
      background: var(--primary);
      color: #fff;
      padding: 16px 20px;
      font-size: 1.4rem;
      font-weight: bold;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .header .icon {
      font-size: 1.6rem;
    }

    .controls {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .controls .button-row {
      display: flex;
      gap: 10px;
    }
    .controls .button-row button.secondary {
      background: #6c757d;
    }
    .controls .button-row button.secondary:hover {
      background: #5a6268;
    }

    .controls select,
    .controls input {
      padding: 10px 12px;
      border: 1px solid var(--input-border);
      border-radius: 5px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .controls select:focus,
    .controls input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
    }

    .controls button {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .controls button:hover {
      background: var(--primary-dark);
    }

    .controls button:active {
      transform: translateY(1px);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    .ideas {
      padding: 0 20px 10px;
      list-style: none;
      margin: 0;
    }
    .count {
      padding: 0 20px 10px;
      font-size: 0.9rem;
      color: #333;
    }
    .footer {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      padding: 10px 0;
      background: #fafafa;
      border-top: 1px solid #e4e6e9;
    }

    .ideas li {
      background: var(--idea-bg);
      padding: 10px 14px;
      margin-bottom: 10px;
      border-radius: 4px;
      font-size: 0.97rem;
      line-height: 1.4;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ideas li:hover {
      background: #f0f2f5;
    }

    .ideas li:last-child {
      margin-bottom: 0;
    }

    .ideas li .idea-text {
      flex: 1;
    }

    .ideas li .delete-btn {
      background: #dc3545;
      color: #fff;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-left: 10px;
      transition: background 0.2s;
    }

    .ideas li .delete-btn:hover {
      background: #c82333;
    }
  </style>
</head>
<body>
  <div class="board">
    <div class="header">
      <span class="icon">💡</span>
      <span>Group Idea Board</span>
    </div>
    <div class="controls">
      <input id="memberInput" type="text" placeholder="Enter your name..." />
      <input id="ideaInput" type="text" placeholder="Enter your idea here..." />
      <div class="button-row">
        <button id="addBtn">Add Idea</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>
    </div>
    <div class="count" id="ideaCount">No ideas yet</div>
    <ul class="ideas" id="ideaList"></ul>
    <div class="footer">&copy; 2026 Group Idea Board</div>
  </div>

  <script>
    const memberInput = document.getElementById('memberInput');
    const ideaInput = document.getElementById('ideaInput');
    const addBtn     = document.getElementById('addBtn');
    const clearBtn   = document.getElementById('clearBtn');
    const ideaList   = document.getElementById('ideaList');
    const ideaCount  = document.getElementById('ideaCount');

    function updateCount() {
      const count = ideaList.children.length;
      ideaCount.textContent = count
        ? `${count} idea${count > 1 ? 's' : ''}`
        : 'No ideas yet';
    }

    addBtn.addEventListener('click', () => {
      const name = memberInput.value.trim();
      const idea = ideaInput.value.trim();

      if (!name) {
        alert('Please enter your name.');
        return;
      }
      if (!idea) {
        alert('Please enter an idea.');
        return;
      }

      const li = document.createElement('li');
      li.innerHTML = `<span class="idea-text">${idea} – suggested by ${name}</span><button class="delete-btn">Delete</button>`;
      
      const deleteBtn = li.querySelector('.delete-btn');
      deleteBtn.addEventListener('click', () => {
        li.remove();
        updateCount();
      });

      ideaList.appendChild(li);

      ideaInput.value = '';
      memberInput.value = '';
      updateCount();
    });

    clearBtn.addEventListener('click', () => {
      ideaInput.value = '';
      memberInput.value = '';
    });

    // initialize count on page load
    updateCount();
  </script>
</body>
</html>
